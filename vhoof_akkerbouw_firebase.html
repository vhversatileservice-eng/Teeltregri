<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vHoof Akkerbouw Registratie</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f6f5f1;--bg3:#eeece6;--txt:#1a1a1a;--txt2:#6b6860;--txt3:#a09e98;
--brd:rgba(0,0,0,.10);--brd2:rgba(0,0,0,.18);--brd3:rgba(0,0,0,.30);
--G:#EAF3DE;--Gb:#97C459;--Gt:#27500A;--Gm:#3B6D11;
--A:#FAEEDA;--Ab:#EF9F27;--At:#633806;
--B:#E6F1FB;--Bt:#0C447C;--C:#FAECE7;--Ct:#712B13;
--T:#E1F5EE;--Tt:#085041;--W:#F1EFE8;--Wt:#444441;
--P:#EEEDFE;--Pt:#3C3489;--R:#FCEBEB;--Rt:#791F1F;--Rb:#E24B4A;
--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{
--bg:#1c1c1a;--bg2:#252522;--bg3:#2e2e2b;--txt:#f0ede8;--txt2:#9a9890;--txt3:#6a6860;
--brd:rgba(255,255,255,.09);--brd2:rgba(255,255,255,.16);--brd3:rgba(255,255,255,.28);
--G:#1a2e0a;--Gb:#3B6D11;--Gt:#C0DD97;--Gm:#9FE1CB;
--A:#2e1e06;--Ab:#854F0B;--At:#FAC775;
--B:#042C53;--Bt:#85B7EB;--C:#2a100a;--Ct:#F0997B;
--T:#04342C;--Tt:#5DCAA5;--W:#2c2c2a;--Wt:#D3D1C7;
--P:#1a1840;--Pt:#AFA9EC;--R:#2a0a0a;--Rt:#F09595;--Rb:#A32D2D}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--txt);background:var(--bg3);min-height:100vh}
.wrap{max-width:980px;margin:0 auto;padding:0 1rem 4rem}
header{background:var(--bg);border-bottom:.5px solid var(--brd);position:sticky;top:0;z-index:50}
.hdr{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:1rem;height:52px;justify-content:space-between;padding:0 1rem}
.logo{font-size:15px;font-weight:700;color:var(--Gm);white-space:nowrap}
nav{display:flex;gap:2px;overflow-x:auto}
nav button{padding:6px 11px;font-size:13px;border-radius:var(--r);border:none;background:transparent;color:var(--txt2);cursor:pointer;white-space:nowrap;font-family:inherit}
nav button.on{background:var(--bg2);color:var(--txt);font-weight:500}
nav button:hover:not(.on){background:var(--bg2)}
.pg{display:none;padding-top:1.5rem}.pg.on{display:block}
.card{background:var(--bg);border:.5px solid var(--brd);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:10px}
.csm{padding:9px 14px;margin-bottom:6px}
.btn{padding:7px 14px;font-size:13px;border-radius:var(--r);border:.5px solid var(--brd2);background:transparent;color:var(--txt);cursor:pointer;font-family:inherit}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.98)}
.grn{background:var(--G);border-color:var(--Gb);color:var(--Gt)}
.grn:hover{filter:brightness(.95)}
.sm{padding:4px 10px;font-size:12px}
.del{padding:3px 8px;font-size:12px;border-radius:var(--r);border:.5px solid var(--Rb);background:transparent;color:var(--Rt);cursor:pointer;font-family:inherit}
.del:hover{background:var(--R)}
.lbl{display:block;font-size:12px;color:var(--txt2);margin-bottom:3px;margin-top:10px}
input,select,textarea{width:100%;padding:7px 10px;font-size:14px;border:.5px solid var(--brd2);border-radius:var(--r);background:var(--bg);color:var(--txt);font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--brd3)}
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
@media(max-width:600px){.g2{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
.sep{height:.5px;background:var(--brd);margin:12px 0}
.stat{background:var(--bg2);border-radius:var(--r);padding:12px 14px}
.slbl{font-size:11px;color:var(--txt2);margin-bottom:3px}
.sval{font-size:18px;font-weight:600}
.ssub{font-size:11px;color:var(--txt2);margin-top:2px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--r);font-weight:500;white-space:nowrap}
.bG{background:var(--G);color:var(--Gt)}.bA{background:var(--A);color:var(--At)}
.bC{background:var(--C);color:var(--Ct)}.bB{background:var(--B);color:var(--Bt)}
.bT{background:var(--T);color:var(--Tt)}.bW{background:var(--W);color:var(--Wt)}
.bP{background:var(--P);color:var(--Pt)}
.empty{color:var(--txt3);font-size:13px;padding:14px 0;text-align:center}
.ab{border:.5px solid var(--brd);border-radius:var(--r);padding:10px 12px;margin-top:8px}
.pr{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-top:.5px solid var(--brd);margin-top:6px}
.wb{background:var(--A);border:.5px solid var(--Ab);border-radius:var(--r);padding:8px 12px;margin-top:6px;font-size:12px;color:var(--At)}
.inb{background:var(--bg2);border:.5px solid var(--brd);border-radius:var(--r);padding:10px 12px;margin-top:8px}
.ts{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.ts button{padding:4px 12px;font-size:12px;border-radius:var(--r);border:.5px solid transparent;background:transparent;color:var(--txt2);cursor:pointer;font-family:inherit}
.ts button.on{background:var(--bg2);border-color:var(--brd2);color:var(--txt);font-weight:500}
.kr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--brd);font-size:13px}
.kr:last-child{border-bottom:none}
.zres{max-height:200px;overflow-y:auto;border:.5px solid var(--brd2);border-radius:var(--r);background:var(--bg)}
.zi{padding:8px 12px;cursor:pointer;border-bottom:.5px solid var(--brd);font-size:13px}
.zi:last-child{border-bottom:none}.zi:hover{background:var(--bg2)}
.zn{font-weight:500}.zs{font-size:11px;color:var(--txt2);margin-top:1px}
.ci{background:var(--bg2);border-radius:var(--r);padding:10px 12px;margin-top:8px;font-size:12px}
.cr{display:flex;gap:8px;padding:4px 0;border-bottom:.5px solid var(--brd)}
.cr:last-child{border-bottom:none}.cl{color:var(--txt2);min-width:190px;flex-shrink:0}
.gc{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:.5px solid var(--brd);border-radius:var(--r);padding:5px 10px;margin:3px;font-size:13px}
.sc{display:inline-flex;align-items:center;gap:5px;background:var(--G);border:.5px solid var(--Gb);color:var(--Gt);border-radius:var(--r);padding:3px 10px;margin:2px;font-size:12px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;z-index:200;overflow-y:auto}
.modal{background:var(--bg);border:.5px solid var(--brd2);border-radius:var(--rl);padding:1.25rem;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.mtit{font-size:16px;font-weight:600;margin-bottom:8px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.pht{font-size:18px;font-weight:700}.phs{font-size:12px;color:var(--txt2);margin-top:2px}
.ia{border:.5px dashed var(--brd2);border-radius:var(--r);padding:1.5rem;text-align:center;color:var(--txt2);font-size:13px;cursor:pointer;margin-top:8px}
.ia:hover{background:var(--bg2)}
.ctbl{width:100%;border-collapse:collapse;font-size:12px}
.ctbl th,.ctbl td{padding:7px 10px;border:.5px solid var(--brd);text-align:left;vertical-align:top}
.ctbl th{background:var(--bg2);font-weight:500;font-size:11px}

.login-screen{position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:500}
.login-card{background:var(--bg);border:.5px solid var(--brd2);border-radius:var(--rl);padding:2.5rem 2rem;max-width:380px;width:100%;text-align:center}
.login-logo{font-size:22px;font-weight:700;color:var(--Gm);margin-bottom:8px}
.login-sub{font-size:14px;color:var(--txt2);margin-bottom:2rem;line-height:1.6}
.login-btn{display:inline-flex;align-items:center;gap:10px;padding:10px 20px;border-radius:var(--r);border:.5px solid var(--brd2);background:var(--bg);color:var(--txt);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;justify-content:center}
.login-btn:hover{background:var(--bg2)}
.user-bar{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;border:.5px solid var(--brd2)}
.sync-dot{font-size:12px;color:var(--txt2)}

/* Mobiele tab bar */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--brd2);z-index:80;padding:0 0 env(safe-area-inset-bottom)}
.mob-nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border:none;background:transparent;color:var(--txt2);font-size:10px;font-family:inherit;cursor:pointer;min-width:0}
.mob-nav button.on{color:var(--Gm)}
.mob-nav button svg{flex-shrink:0}
.mob-nav button span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px}
.desk-nav{display:flex;gap:2px;overflow-x:auto}
@media(max-width:700px){
  .desk-nav{display:none}
  .mob-nav{display:flex}
  .wrap{padding-bottom:80px}
  .user-bar .btn{display:none}
}
</style>
</head>
<body>

<!-- Login scherm -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">vHoof Akkerbouw</div>
    <div class="login-sub">Registratiesysteem voor percelen,<br>acties en CTGB-middelen</div>
    <button class="login-btn" onclick="loginMetGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.34-8.16 2.34-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Inloggen met Google
    </button>
  </div>
</div>

<!-- App scherm -->
<div id="app-screen" style="display:none">
  <header>
    <div class="hdr">
      <div class="logo">vHoof Akkerbouw</div>
      <nav class="desk-nav">
        <button id="nb-percelen" data-tab="percelen" class="on">Percelen</button>
        <button id="nb-producten" data-tab="producten">Producten</button>
        <button id="nb-ctgb" data-tab="ctgb">CTGB</button>
        <button id="nb-vergelijk" data-tab="vergelijk">Vergelijken</button>
        <button id="nb-actietypen" data-tab="actietypen">Actietypen</button>
        <button id="nb-gewassen" data-tab="gewassen">Gewassen</button>
        <button id="nb-overzicht" data-tab="overzicht">Overzicht</button>
      </nav>
      <div class="user-bar">
        <span id="sync-indicator" class="sync-dot"></span>
        <img id="user-avatar" class="user-avatar" src="" alt="">
        <span id="user-name" style="font-size:13px;color:var(--txt2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <button class="btn sm" onclick="uitloggen()">Uit</button>
      </div>
    </div>
  </header>
  <!-- Mobiele tab bar onderaan -->
  <nav class="mob-nav">
    <button id="mn-percelen" data-tab="percelen" class="on" onclick="gN('percelen')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Percelen</span>
    </button>
    <button id="mn-producten" data-tab="producten" onclick="gN('producten')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16v-2"/><polyline points="7.5 4.21 12 6.81 16.5 4.21"/><polyline points="7.5 19.79 7.5 14.6 3 12"/><polyline points="21 12 16.5 14.6 16.5 19.79"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      <span>Producten</span>
    </button>
    <button id="mn-ctgb" data-tab="ctgb" onclick="gN('ctgb')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>CTGB</span>
    </button>
    <button id="mn-overzicht" data-tab="overzicht" onclick="gN('overzicht')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Overzicht</span>
    </button>
    <button id="mn-meer" onclick="toggleMeerMenu()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      <span>Meer</span>
    </button>
  </nav>
  <!-- Meer menu popup -->
  <div id="meer-menu" style="display:none;position:fixed;bottom:65px;right:0;left:0;background:var(--bg);border-top:.5px solid var(--brd2);z-index:90;padding:8px 0">
    <button onclick="gN('vergelijk');toggleMeerMenu()" style="display:flex;align-items:center;gap:12px;width:100%;padding:12px 20px;border:none;background:transparent;color:var(--txt);font-size:14px;font-family:inherit;cursor:pointer">Vergelijken</button>
    <button onclick="gN('actietypen');toggleMeerMenu()" style="display:flex;align-items:center;gap:12px;width:100%;padding:12px 20px;border:none;background:transparent;color:var(--txt);font-size:14px;font-family:inherit;cursor:pointer">Actietypen &amp; tarieven</button>
    <button onclick="gN('gewassen');toggleMeerMenu()" style="display:flex;align-items:center;gap:12px;width:100%;padding:12px 20px;border:none;background:transparent;color:var(--txt);font-size:14px;font-family:inherit;cursor:pointer">Gewassen</button>
    <div style="height:.5px;background:var(--brd);margin:4px 0"></div>
    <button onclick="uitloggen();toggleMeerMenu()" style="display:flex;align-items:center;gap:12px;width:100%;padding:12px 20px;border:none;background:transparent;color:var(--Rt);font-size:14px;font-family:inherit;cursor:pointer">Uitloggen</button>
  </div>
  <div class="wrap">
    <div id="pg-percelen" class="pg on"></div>
    <div id="pg-producten" class="pg"></div>
    <div id="pg-ctgb" class="pg"></div>
    <div id="pg-vergelijk" class="pg"></div>
    <div id="pg-actietypen" class="pg"></div>
    <div id="pg-gewassen" class="pg"></div>
    <div id="pg-overzicht" class="pg"></div>
  </div>
</div>

<div id="mc"></div>

function zCTGB(q) {
  if (!q || q.length < 2) return [];
  var ql = q.toLowerCase();
  return CTGB_DATA.filter(function(m) {
    return m.naam.toLowerCase().includes(ql) ||
      (m.werkzameStoffen && m.werkzameStoffen.toLowerCase().includes(ql)) ||
      (m.aardWerking && m.aardWerking.toLowerCase().includes(ql));
  }).slice(0, 40);
}
function gCTGB(naam) { return CTGB_DATA.find(function(m){return m.naam===naam;}) || null; }



function parseDagen(str) {
  // Parset "14 dagen", "3 weken", "14 dagen, 21 dagen" -> laagste waarde in dagen
  if (!str) return null;
  var vals = String(str).split(',').map(function(s) { return s.trim(); });
  var dagen = [];
  vals.forEach(function(v) {
    var m = v.match(/(\d+(?:\.\d+)?)\s*(dag|dagen|week|weken)/i);
    if (m) {
      var n = parseFloat(m[1]);
      var eenheid = m[2].toLowerCase();
      if (eenheid.startsWith('week')) n = n * 7;
      dagen.push(n);
    }
  });
  if (!dagen.length) return null;
  return Math.min.apply(null, dagen);
}

function parseDosis(str) {
  // Parset "1.5 L/ha", "0.25 kg/ha", "1.0 L/ha, 2.5 L/ha" -> {waarde, eenheid} laagste
  if (!str) return null;
  var vals = String(str).split(',').map(function(s) { return s.trim(); });
  var resultaten = [];
  vals.forEach(function(v) {
    var m = v.match(/(\d+(?:\.\d+)?)\s*(L|kg|g|ml)\/ha/i);
    if (m) resultaten.push({ waarde: parseFloat(m[1]), eenheid: m[2].toLowerCase() });
  });
  if (!resultaten.length) return null;
  // Groepeer per eenheid, neem HOOGSTE per eenheid (meest permissief)
  var perEenheid = {};
  resultaten.forEach(function(r) {
    if (!perEenheid[r.eenheid] || r.waarde > perEenheid[r.eenheid])
      perEenheid[r.eenheid] = r.waarde;
  });
  return perEenheid; // bijv {l: 1.5} of {kg: 0.25}
}

function parseMaxToep(str) {
  // Parset "2.0", "1.0, 2.0" -> laagste waarde
  if (!str) return null;
  var vals = String(str).split(',').map(function(s) { return parseFloat(s.trim()); }).filter(function(n) { return !isNaN(n); });
  if (!vals.length) return null;
  return Math.min.apply(null, vals);
}

function dagVerschil(datumA, datumB) {
  // Geeft verschil in dagen tussen twee datum-strings (yyyy-mm-dd)
  if (!datumA || !datumB) return null;
  var a = new Date(datumA), b = new Date(datumB);
  if (isNaN(a) || isNaN(b)) return null;
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
}

function isOogstActie(actietypeId) {
  var at = db.actietypen.find(function(x) { return x.id === actietypeId; });
  if (!at) return false;
  return at.naam.toLowerCase().includes('oogst');
}

function ctgbChecks(ctgbNaam, perceel, actieId, dosering, eenheid) {
  var m = gCTGB(ctgbNaam);
  if (!m) return { info: [], warns: [] };

  var info  = [];
  var warns = [];

  // Huidige actie
  var huidigeActie = (perceel.acties || []).find(function(a) { return a.id === actieId; });
  var huidigeDatum = huidigeActie ? huidigeActie.datum : null;

  // Alle andere acties op dit perceel die dit middel bevatten
  var andereActies = [];
  (perceel.acties || []).forEach(function(a) {
    if (a.id === actieId) return;
    (a.producten || []).forEach(function(pr) {
      var prod = db.producten.find(function(x) { return x.id === pr.productId; });
      if (prod && prod.ctgb === ctgbNaam) {
        andereActies.push({ actie: a, dosering: parseFloat(pr.dosering) || 0 });
      }
    });
  });

  var ha = parseFloat(perceel.ha) || 0;

  /* ---- CHECK 1: Max toepassingen per teeltcyclus ---- */
  var maxToep = parseMaxToep(m.maxToepassingenTeelt);
  if (maxToep !== null) {
    var aantalGebruikt = andereActies.length;
    // +1 voor de huidige toepassing
    if (aantalGebruikt + 1 > maxToep) {
      warns.push('Max toepassingen overschreden: ' + (aantalGebruikt + 1) + ' van max ' + maxToep + ' per teeltcyclus');
    } else {
      info.push('Max ' + maxToep + ' toepassingen/teelt (' + aantalGebruikt + ' gebruikt)');
    }
  }

  /* ---- CHECK 2: Veiligheidstermijn ---- */
  var veilDagen = parseDagen(m.veiligheidstermijn);
  if (veilDagen !== null) {
    var oogstActie = (perceel.acties || []).find(function(a) {
      return a.id !== actieId && isOogstActie(a.actietypeId) && a.datum;
    });
    if (oogstActie && huidigeDatum) {
      var verschil = dagVerschil(huidigeDatum, oogstActie.datum);
      if (verschil !== null && verschil < veilDagen) {
        warns.push('Veiligheidstermijn niet gehaald: oogst over ' + verschil + ' dagen, minimum is ' + veilDagen + ' dagen');
      } else if (verschil !== null) {
        info.push('Veiligheidstermijn: ' + veilDagen + ' dagen (oogst over ' + verschil + ' dagen \u2714)');
      } else {
        info.push('Veiligheidstermijn: ' + veilDagen + ' dagen');
      }
    } else {
      info.push('Veiligheidstermijn: ' + veilDagen + ' dagen');
    }
  }

  /* ---- CHECK 3: Min. interval tussen toepassingen ---- */
  var minInterval = parseDagen(m.minInterval);
  if (minInterval !== null) {
    if (huidigeDatum && andereActies.length > 0) {
      // Zoek de meest recente andere toepassing
      var datums = andereActies
        .map(function(x) { return x.actie.datum; })
        .filter(function(d) { return !!d; })
        .sort();
      var meestRecent = datums[datums.length - 1];
      if (meestRecent) {
        var intervalDagen = dagVerschil(meestRecent, huidigeDatum);
        if (intervalDagen !== null && Math.abs(intervalDagen) < minInterval) {
          warns.push('Min. interval niet gehaald: ' + Math.abs(intervalDagen) + ' dagen tussen toepassingen, minimum is ' + minInterval + ' dagen');
        } else if (intervalDagen !== null) {
          info.push('Min. interval: ' + minInterval + ' dagen (' + Math.abs(intervalDagen) + ' dagen geleden \u2714)');
        } else {
          info.push('Min. interval: ' + minInterval + ' dagen');
        }
      }
    } else {
      info.push('Min. interval: ' + minInterval + ' dagen');
    }
  }

  /* ---- CHECK 4: Max dosis per seizoen ---- */
  var maxSeizoen = parseDosis(m.maxDosisSeizoen);
  if (maxSeizoen && dosering && ha) {
    var dosEenheid = (eenheid || '').toLowerCase();
    var maxWaarde = maxSeizoen[dosEenheid];
    if (maxWaarde !== undefined) {
      var totaalGebruiktPerHa = andereActies.reduce(function(s, x) { return s + x.dosering; }, 0);
      var nieuwTotaalPerHa = totaalGebruiktPerHa + dosering;
      if (nieuwTotaalPerHa > maxWaarde) {
        warns.push('Max seizoensdosis overschreden: ' + nieuwTotaalPerHa.toFixed(2) + ' ' + dosEenheid + '/ha van max ' + maxWaarde + ' ' + dosEenheid + '/ha');
      } else {
        info.push('Max seizoensdosis: ' + maxWaarde + ' ' + dosEenheid + '/ha (totaal: ' + nieuwTotaalPerHa.toFixed(2) + '/' + maxWaarde + ' ' + dosEenheid + '/ha ✔)');
      }
    } else {
      info.push('Max seizoensdosis: ' + m.maxDosisSeizoen);
    }
  } else if (m.maxDosisSeizoen) {
    info.push('Max seizoensdosis: ' + m.maxDosisSeizoen);
  }

  /* ---- CHECK 5: Max dosis per toepassing ---- */
  var maxToepDosis = parseDosis(m.maxDosis);
  if (maxToepDosis && dosering) {
    var dosEenheid2 = (eenheid || '').toLowerCase();
    var maxW2 = maxToepDosis[dosEenheid2];
    if (maxW2 !== undefined) {
      if (dosering > maxW2) {
        warns.push('Max dosis per toepassing overschreden: ' + dosering + ' ' + dosEenheid2 + '/ha, max is ' + maxW2 + ' ' + dosEenheid2 + '/ha');
      } else {
        info.push('Max dosis: ' + maxW2 + ' ' + dosEenheid2 + '/ha (' + dosering + ' ingevuld \u2714)');
      }
    } else {
      info.push('Max dosis: ' + m.maxDosis);
    }
  } else if (m.maxDosis) {
    info.push('Max dosis: ' + m.maxDosis);
  }

  return { info: info, warns: warns };
}

function aNm(id) { return (db.actietypen.find(function(x){return x.id===id;})||{}).naam||'Onbekend'; }
function aTr(id) { return parseFloat((db.actietypen.find(function(x){return x.id===id;})||{}).tarief||0); }

/* ---- Berekeningen ---- */
function bAct(a, ha) {
  var prod = (a.producten||[]).reduce(function(s,pr) {
    var p = db.producten.find(function(x){return x.id===pr.productId;});
    return s + (p ? parseFloat(pr.dosering)*ha*parseFloat(p.prijs||0) : 0);
  }, 0);
  var uitv = aTr(a.actietypeId) * ha;
  return {prod:prod, uitv:uitv, totaal:prod+uitv};
}
function bPerc(p) {
  var ha = parseFloat(p.ha)||0, prod = 0, uitv = 0;
  (p.acties||[]).forEach(function(a){var r=bAct(a,ha);prod+=r.prod;uitv+=r.uitv;});
  var kosten = prod + uitv;
  var ink = (p.inkomsten||[]).reduce(function(s,i){return s+parseFloat(i.totaal||0);}, 0);
  return {prod:prod, uitv:uitv, kosten:kosten, inkomen:ink, saldo:ink-kosten, ha:ha};
}

/* ---- Navigatie ---- */
function alleJaren() {
  var j = new Set(db.percelen.map(function(p){return p.jaar;}));
  j.add(new Date().getFullYear());
  return Array.from(j).sort(function(a,b){return b-a;});
}
function gJaar(sfx) {
  var s = document.getElementById('js' + (sfx||''));
  return s ? parseInt(s.value) : new Date().getFullYear();
}

/* ---- Helper: maak element ---- */
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'cls') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k === 'txt') e.textContent = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (children && Array.isArray(children)) children.forEach(function(c){ if(c) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}
function div(cls, a, b) {
  // a kan array (children) of object (attrs) zijn, b is dan children of leeg
  var children, attrs;
  if (Array.isArray(a)) { children=a; attrs=b; }
  else if (a && typeof a==='object') { attrs=a; children=b; }
  else { children=a; attrs=b; }
  return el('div', Object.assign({cls:cls}, attrs||{}), children||null);
}
function btn(txt, cls, fn) {
  return el('button', {cls:'btn '+(cls||''), txt:txt, onclick:fn});
}
function delbtn(fn) {
  return el('button', {cls:'del', txt:'\u2715', onclick:fn});
}
function badge(txt, kleur) {
  return el('span', {cls:'badge ' + (KLCSS[kleur]||'bW'), txt:txt});
}

/* ---- PERCELEN ---- */
function rPerc() {
  var el2 = document.getElementById('pg-percelen');
  var jaren = alleJaren(), jaar = gJaar();
  var perc = db.percelen.filter(function(p){return p.jaar===jaar;});

  var sel = document.createElement('select');
  sel.id = 'js'; sel.style.width='90px';
  jaren.forEach(function(j){
    var o = document.createElement('option');
    o.value = j; o.textContent = j;
    if (j===jaar) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = rPerc;

  var hdr = div('ph', [
    div('', [
      el('div',{cls:'pht',txt:'Percelen'}),
      el('div',{cls:'phs',txt:'Seizoen '+jaar+' \u2014 '+perc.length+' perceel'+(perc.length!==1?'en':'')})
    ]),
    div('',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[
      sel,
      btn('+ Perceel','grn',function(){openPM(null);})
    ])
  ]);

  var body = document.createDocumentFragment();
  if (!perc.length) {
    body.appendChild(el('div',{cls:'empty',txt:'Nog geen percelen voor '+jaar+'.'}));
  } else {
    perc.forEach(function(p) { body.appendChild(buildPerceelCard(p)); });
  }

  el2.innerHTML = '';
  el2.appendChild(hdr);
  el2.appendChild(body);
}

/* ---- CTGB CHECK HELPERS ---- */

function zCTGB(q) {
  if (!q || q.length < 2) return [];
  var ql = q.toLowerCase();
  return CTGB_DATA.filter(function(m) {
    return m.naam.toLowerCase().includes(ql) ||
      (m.werkzameStoffen && m.werkzameStoffen.toLowerCase().includes(ql)) ||
      (m.aardWerking && m.aardWerking.toLowerCase().includes(ql));
  }).slice(0, 40);
}
function gCTGB(naam) { return CTGB_DATA.find(function(m){return m.naam===naam;}) || null; }



function parseDagen(str) {
  // Parset "14 dagen", "3 weken", "14 dagen, 21 dagen" -> laagste waarde in dagen
  if (!str) return null;
  var vals = String(str).split(',').map(function(s) { return s.trim(); });
  var dagen = [];
  vals.forEach(function(v) {
    var m = v.match(/(\d+(?:\.\d+)?)\s*(dag|dagen|week|weken)/i);
    if (m) {
      var n = parseFloat(m[1]);
      var eenheid = m[2].toLowerCase();
      if (eenheid.startsWith('week')) n = n * 7;
      dagen.push(n);
    }
  });
  if (!dagen.length) return null;
  return Math.min.apply(null, dagen);
}

function parseDosis(str) {
  // Parset "1.5 L/ha", "0.25 kg/ha", "1.0 L/ha, 2.5 L/ha" -> {waarde, eenheid} laagste
  if (!str) return null;
  var vals = String(str).split(',').map(function(s) { return s.trim(); });
  var resultaten = [];
  vals.forEach(function(v) {
    var m = v.match(/(\d+(?:\.\d+)?)\s*(L|kg|g|ml)\/ha/i);
    if (m) resultaten.push({ waarde: parseFloat(m[1]), eenheid: m[2].toLowerCase() });
  });
  if (!resultaten.length) return null;
  // Groepeer per eenheid, neem HOOGSTE per eenheid (meest permissief)
  var perEenheid = {};
  resultaten.forEach(function(r) {
    if (!perEenheid[r.eenheid] || r.waarde > perEenheid[r.eenheid])
      perEenheid[r.eenheid] = r.waarde;
  });
  return perEenheid; // bijv {l: 1.5} of {kg: 0.25}
}

function parseMaxToep(str) {
  // Parset "2.0", "1.0, 2.0" -> laagste waarde
  if (!str) return null;
  var vals = String(str).split(',').map(function(s) { return parseFloat(s.trim()); }).filter(function(n) { return !isNaN(n); });
  if (!vals.length) return null;
  return Math.min.apply(null, vals);
}

function dagVerschil(datumA, datumB) {
  // Geeft verschil in dagen tussen twee datum-strings (yyyy-mm-dd)
  if (!datumA || !datumB) return null;
  var a = new Date(datumA), b = new Date(datumB);
  if (isNaN(a) || isNaN(b)) return null;
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
}

function isOogstActie(actietypeId) {
  var at = db.actietypen.find(function(x) { return x.id === actietypeId; });
  if (!at) return false;
  return at.naam.toLowerCase().includes('oogst');
}

function ctgbChecks(ctgbNaam, perceel, actieId, dosering, eenheid) {
  var m = gCTGB(ctgbNaam);
  if (!m) return { info: [], warns: [] };

  var info  = [];
  var warns = [];

  // Huidige actie
  var huidigeActie = (perceel.acties || []).find(function(a) { return a.id === actieId; });
  var huidigeDatum = huidigeActie ? huidigeActie.datum : null;

  // Alle andere acties op dit perceel die dit middel bevatten
  var andereActies = [];
  (perceel.acties || []).forEach(function(a) {
    if (a.id === actieId) return;
    (a.producten || []).forEach(function(pr) {
      var prod = db.producten.find(function(x) { return x.id === pr.productId; });
      if (prod && prod.ctgb === ctgbNaam) {
        andereActies.push({ actie: a, dosering: parseFloat(pr.dosering) || 0 });
      }
    });
  });

  var ha = parseFloat(perceel.ha) || 0;

  /* ---- CHECK 1: Max toepassingen per teeltcyclus ---- */
  var maxToep = parseMaxToep(m.maxToepassingenTeelt);
  if (maxToep !== null) {
    var aantalGebruikt = andereActies.length;
    // +1 voor de huidige toepassing
    if (aantalGebruikt + 1 > maxToep) {
      warns.push('Max toepassingen overschreden: ' + (aantalGebruikt + 1) + ' van max ' + maxToep + ' per teeltcyclus');
    } else {
      info.push('Max ' + maxToep + ' toepassingen/teelt (' + aantalGebruikt + ' gebruikt)');
    }
  }

  /* ---- CHECK 2: Veiligheidstermijn ---- */
  var veilDagen = parseDagen(m.veiligheidstermijn);
  if (veilDagen !== null) {
    var oogstActie = (perceel.acties || []).find(function(a) {
      return a.id !== actieId && isOogstActie(a.actietypeId) && a.datum;
    });
    if (oogstActie && huidigeDatum) {
      var verschil = dagVerschil(huidigeDatum, oogstActie.datum);
      if (verschil !== null && verschil < veilDagen) {
        warns.push('Veiligheidstermijn niet gehaald: oogst over ' + verschil + ' dagen, minimum is ' + veilDagen + ' dagen');
      } else if (verschil !== null) {
        info.push('Veiligheidstermijn: ' + veilDagen + ' dagen (oogst over ' + verschil + ' dagen \u2714)');
      } else {
        info.push('Veiligheidstermijn: ' + veilDagen + ' dagen');
      }
    } else {
      info.push('Veiligheidstermijn: ' + veilDagen + ' dagen');
    }
  }

  /* ---- CHECK 3: Min. interval tussen toepassingen ---- */
  var minInterval = parseDagen(m.minInterval);
  if (minInterval !== null) {
    if (huidigeDatum && andereActies.length > 0) {
      // Zoek de meest recente andere toepassing
      var datums = andereActies
        .map(function(x) { return x.actie.datum; })
        .filter(function(d) { return !!d; })
        .sort();
      var meestRecent = datums[datums.length - 1];
      if (meestRecent) {
        var intervalDagen = dagVerschil(meestRecent, huidigeDatum);
        if (intervalDagen !== null && Math.abs(intervalDagen) < minInterval) {
          warns.push('Min. interval niet gehaald: ' + Math.abs(intervalDagen) + ' dagen tussen toepassingen, minimum is ' + minInterval + ' dagen');
        } else if (intervalDagen !== null) {
          info.push('Min. interval: ' + minInterval + ' dagen (' + Math.abs(intervalDagen) + ' dagen geleden \u2714)');
        } else {
          info.push('Min. interval: ' + minInterval + ' dagen');
        }
      }
    } else {
      info.push('Min. interval: ' + minInterval + ' dagen');
    }
  }

  /* ---- CHECK 4: Max dosis per seizoen ---- */
  var maxSeizoen = parseDosis(m.maxDosisSeizoen);
  if (maxSeizoen && dosering && ha) {
    var dosEenheid = (eenheid || '').toLowerCase();
    var maxWaarde = maxSeizoen[dosEenheid];
    if (maxWaarde !== undefined) {
      var totaalGebruiktPerHa = andereActies.reduce(function(s, x) { return s + x.dosering; }, 0);
      var nieuwTotaalPerHa = totaalGebruiktPerHa + dosering;
      if (nieuwTotaalPerHa > maxWaarde) {
        warns.push('Max seizoensdosis overschreden: ' + nieuwTotaalPerHa.toFixed(2) + ' ' + dosEenheid + '/ha van max ' + maxWaarde + ' ' + dosEenheid + '/ha');
      } else {
        info.push('Max seizoensdosis: ' + maxWaarde + ' ' + dosEenheid + '/ha (totaal: ' + nieuwTotaalPerHa.toFixed(2) + '/' + maxWaarde + ' ' + dosEenheid + '/ha ✔)');
      }
    } else {
      info.push('Max seizoensdosis: ' + m.maxDosisSeizoen);
    }
  } else if (m.maxDosisSeizoen) {
    info.push('Max seizoensdosis: ' + m.maxDosisSeizoen);
  }

  /* ---- CHECK 5: Max dosis per toepassing ---- */
  var maxToepDosis = parseDosis(m.maxDosis);
  if (maxToepDosis && dosering) {
    var dosEenheid2 = (eenheid || '').toLowerCase();
    var maxW2 = maxToepDosis[dosEenheid2];
    if (maxW2 !== undefined) {
      if (dosering > maxW2) {
        warns.push('Max dosis per toepassing overschreden: ' + dosering + ' ' + dosEenheid2 + '/ha, max is ' + maxW2 + ' ' + dosEenheid2 + '/ha');
      } else {
        info.push('Max dosis: ' + maxW2 + ' ' + dosEenheid2 + '/ha (' + dosering + ' ingevuld \u2714)');
      }
    } else {
      info.push('Max dosis: ' + m.maxDosis);
    }
  } else if (m.maxDosis) {
    info.push('Max dosis: ' + m.maxDosis);
  }

  return { info: info, warns: warns };
}

/* ---- Actietypes ---- */
function aKl(id) { return (db.actietypen.find(function(x){return x.id===id;})||{}).kleur||'gray'; }
function aNm(id) { return (db.actietypen.find(function(x){return x.id===id;})||{}).naam||'Onbekend'; }
function aTr(id) { return parseFloat((db.actietypen.find(function(x){return x.id===id;})||{}).tarief||0); }

/* ---- Berekeningen ---- */
function bAct(a, ha) {
  var prod = (a.producten||[]).reduce(function(s,pr) {
    var p = db.producten.find(function(x){return x.id===pr.productId;});
    return s + (p ? parseFloat(pr.dosering)*ha*parseFloat(p.prijs||0) : 0);
  }, 0);
  var uitv = aTr(a.actietypeId) * ha;
  return {prod:prod, uitv:uitv, totaal:prod+uitv};
}
function bPerc(p) {
  var ha = parseFloat(p.ha)||0, prod = 0, uitv = 0;
  (p.acties||[]).forEach(function(a){var r=bAct(a,ha);prod+=r.prod;uitv+=r.uitv;});
  var kosten = prod + uitv;
  var ink = (p.inkomsten||[]).reduce(function(s,i){return s+parseFloat(i.totaal||0);}, 0);
  return {prod:prod, uitv:uitv, kosten:kosten, inkomen:ink, saldo:ink-kosten, ha:ha};
}

/* ---- Navigatie ---- */
function alleJaren() {
  var j = new Set(db.percelen.map(function(p){return p.jaar;}));
  j.add(new Date().getFullYear());
  return Array.from(j).sort(function(a,b){return b-a;});
}
function gJaar(sfx) {
  var s = document.getElementById('js' + (sfx||''));
  return s ? parseInt(s.value) : new Date().getFullYear();
}

var curTab = 'percelen';
function gN(tab) {
  curTab = tab;
  document.querySelectorAll('.pg').forEach(function(el){el.classList.remove('on');});
  document.querySelectorAll('.desk-nav button, .mob-nav button').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pg-'+tab).classList.add('on');
  var deskBtn = document.getElementById('nb-'+tab);
  if (deskBtn) deskBtn.classList.add('on');
  var mobBtn = document.getElementById('mn-'+tab);
  if (mobBtn) mobBtn.classList.add('on');
  // Sluit meer menu
  var menu = document.getElementById('meer-menu');
  if (menu) menu.style.display = 'none';
  rTab(tab);
}
function rTab(t) {
  var fns = {percelen:rPerc,producten:rProd,ctgb:rCTGB,vergelijk:rVerg,
              actietypen:rAT,gewassen:rGew,overzicht:rOv};
  if (fns[t]) fns[t]();
}

/* ---- Helper: maak element ---- */
function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'cls') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else if (k === 'txt') e.textContent = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  });
  if (children && Array.isArray(children)) children.forEach(function(c){ if(c) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
}
function div(cls, a, b) {
  // a kan array (children) of object (attrs) zijn, b is dan children of leeg
  var children, attrs;
  if (Array.isArray(a)) { children=a; attrs=b; }
  else if (a && typeof a==='object') { attrs=a; children=b; }
  else { children=a; attrs=b; }
  return el('div', Object.assign({cls:cls}, attrs||{}), children||null);
}
function btn(txt, cls, fn) {
  return el('button', {cls:'btn '+(cls||''), txt:txt, onclick:fn});
}
function delbtn(fn) {
  return el('button', {cls:'del', txt:'\u2715', onclick:fn});
}
function badge(txt, kleur) {
  return el('span', {cls:'badge ' + (KLCSS[kleur]||'bW'), txt:txt});
}

/* ---- PERCELEN ---- */
function rPerc() {
  var el2 = document.getElementById('pg-percelen');
  var jaren = alleJaren(), jaar = gJaar();
  var perc = db.percelen.filter(function(p){return p.jaar===jaar;});

  var sel = document.createElement('select');
  sel.id = 'js'; sel.style.width='90px';
  jaren.forEach(function(j){
    var o = document.createElement('option');
    o.value = j; o.textContent = j;
    if (j===jaar) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = rPerc;

  var hdr = div('ph', [
    div('', [
      el('div',{cls:'pht',txt:'Percelen'}),
      el('div',{cls:'phs',txt:'Seizoen '+jaar+' \u2014 '+perc.length+' perceel'+(perc.length!==1?'en':'')})
    ]),
    div('',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[
      sel,
      btn('+ Perceel','grn',function(){openPM(null);})
    ])
  ]);

  var body = document.createDocumentFragment();
  if (!perc.length) {
    body.appendChild(el('div',{cls:'empty',txt:'Nog geen percelen voor '+jaar+'.'}));
  } else {
    perc.forEach(function(p) { body.appendChild(buildPerceelCard(p)); });
  }

  el2.innerHTML = '';
  el2.appendChild(hdr);
  el2.appendChild(body);
}

function buildPerceelCard(p) {
  var r = bPerc(p);
  var sc = r.saldo >= 0 ? 'var(--Gm)' : 'var(--Rt)';

  var metaStr = eh(p.gewas) + ' \u00b7 ' + r.ha + ' ha \u00b7 ' +
    (p.acties||[]).length + ' acties \u00b7 ' + (p.inkomsten||[]).length + ' verkopen';

  var saldoDiv = div('',{style:'text-align:right'},[
    el('div',{style:'font-size:13px;font-weight:600;color:'+sc,
      txt:(r.saldo>=0?'+':'')+fk(r.saldo)}),
    el('div',{style:'font-size:11px;color:var(--txt2)',
      txt:'inkomen: '+fk(r.inkomen)+' \u00b7 kosten: '+fk(r.kosten)})
  ]);

  var topRow = div('',{style:'display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap'},[
    div('',[
      el('div',{style:'font-size:15px;font-weight:600',txt:p.naam}),
      el('div',{style:'font-size:12px;color:var(--txt2);margin-top:2px',html:metaStr})
    ]),
    div('',{style:'display:flex;gap:6px;align-items:center;flex-wrap:wrap'},[
      saldoDiv,
      btn('+ Actie','sm',function(){openAM(p.id);}),
      btn('+ Verkoop','sm',function(){openIM(p.id);}),
      btn('\u270e','sm',function(){openPM(p.id);}),
      delbtn(function(){dPerc(p.id);})
    ])
  ]);

  var card = div('card',[topRow]);

  // Inkomsten
  var inkomsten = p.inkomsten || [];
  if (inkomsten.length) {
    var inkHdr = el('div',{style:'font-size:11px;font-weight:600;color:var(--Gm);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em',txt:'Verkopen'});
    var inkSect = div('',{style:'margin-top:10px;border-top:.5px solid var(--brd);padding-top:8px'},[inkHdr]);
    inkomsten.forEach(function(inv) {
      var row = div('',{style:'display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--brd);font-size:13px'},[
        div('',[
          el('span',{style:'color:var(--txt2);font-size:12px',txt:inv.datum||''}),
          inv.opmerking ? el('span',{style:'font-size:12px;font-style:italic;color:var(--txt2)',txt:' \u00b7 '+inv.opmerking}) : null
        ]),
        div('',{style:'display:flex;gap:8px;align-items:center'},[
          el('span',{style:'font-weight:600;color:var(--Gm)',txt:fk(inv.totaal)}),
          delbtn(function(iid){return function(){dInk(p.id,iid);};}(inv.id))
        ])
      ]);
      inkSect.appendChild(row);
    });
    card.appendChild(inkSect);
  }

  // Acties
  var acties = p.acties || [];
  if (!acties.length) {
    card.appendChild(el('div',{cls:'empty',style:'font-size:12px',txt:'Nog geen acties.'}));
  }
  acties.forEach(function(a) {
    card.appendChild(buildActieBlok(p, a, r.ha));
  });

  return card;
}

function buildActieBlok(p, a, ha) {
  var k = aKl(a.actietypeId);
  var ra = bAct(a, ha);

  var warns = [];
  var infos = [];
  (a.producten||[]).forEach(function(pr){
    var prod = db.producten.find(function(x){return x.id===pr.productId;});
    if (prod && prod.ctgb) {
      var checks = ctgbChecks(prod.ctgb, p, a.id, parseFloat(pr.dosering), prod.eenheid);
      checks.warns.forEach(function(w){warns.push({pn:prod.naam,w:w});});
      checks.info.forEach(function(i){infos.push({pn:prod.naam,i:i});});
    }
  });

  var topRow = div('',{style:'display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap'},[
    div('',{style:'display:flex;gap:8px;align-items:center;flex-wrap:wrap'},[
      badge(aNm(a.actietypeId), k),
      el('span',{style:'font-size:12px;color:var(--txt2)',txt:a.datum||''}),
      a.notitie ? el('span',{style:'font-size:12px;color:var(--txt2);font-style:italic',txt:a.notitie}) : null
    ]),
    div('',{style:'display:flex;gap:6px;align-items:center'},[
      el('span',{style:'font-size:12px;font-weight:600;color:var(--txt2)',txt:fk(ra.totaal)}),
      btn('+ Product','sm',function(){openPA(p.id, a.id);}),
      delbtn(function(){dAct(p.id, a.id);})
    ])
  ]);

  var infoTxt = 'Uitvoering: '+fk(ra.uitv)+' \u00b7 Producten: '+fk(ra.prod)+' \u00b7 Tarief: '+fk(aTr(a.actietypeId))+'/ha';
  var blok = div('ab',[
    topRow,
    el('div',{style:'font-size:11px;color:var(--txt2);margin-top:4px',txt:infoTxt})
  ]);

  if (warns.length) {
    var wb = div('wb',[el('div',{style:'font-weight:600;margin-bottom:3px',txt:'\u26a0 CTGB overschrijding'})]);
    warns.forEach(function(x){
      wb.appendChild(el('div',{style:'margin-top:2px',html:'<b>'+eh(x.pn)+':</b> '+eh(x.w)}));
    });
    blok.appendChild(wb);
  }
  if (infos.length) {
    var ib = div('',{style:'background:var(--B);border:.5px solid var(--Bt);border-radius:var(--r);padding:6px 10px;margin-top:4px;font-size:11px;color:var(--Bt)'});
    ib.appendChild(el('div',{style:'font-weight:600;margin-bottom:2px',txt:'CTGB info'}));
    infos.forEach(function(x){
      ib.appendChild(el('div',{style:'margin-top:1px',html:'<b>'+eh(x.pn)+':</b> '+eh(x.i)}));
    });
    blok.appendChild(ib);
  }

  (a.producten||[]).forEach(function(pr){
    var prod = db.producten.find(function(x){return x.id===pr.productId;});
    if (!prod) return;
    var tot = parseFloat(pr.dosering) * ha;
    var kost = tot * (parseFloat(prod.prijs)||0);
    var infoStr = pr.dosering+' '+prod.eenheid+'/ha \u00d7 '+ha+' ha = '+tot.toFixed(2)+' '+prod.eenheid+' \u00b7 '+fk(kost);
    var ctgbBadge = prod.ctgb ? el('span',{cls:'badge bB',style:'font-size:10px;padding:1px 5px;margin-left:4px',txt:'CTGB'}) : null;
    var nameEl = el('div',{style:'font-size:13px;font-weight:500'},[
      el('span',{txt:prod.naam}), ctgbBadge
    ]);
    var prRow = div('pr',[
      div('',{style:'flex:1;min-width:0'},[
        nameEl,
        el('div',{style:'font-size:11px;color:var(--txt2)',txt:infoStr})
      ]),
      delbtn(function(pid,aid,prid){return function(){dPV(pid,aid,prid);};}(p.id,a.id,pr.id))
    ]);
    blok.appendChild(prRow);
  });

  return blok;
}

function fCTGB() {
  var q = (document.getElementById('cq')||{}).value||'';
  var f = (document.getElementById('cf')||document.querySelector('#pg-ctgb select')||{}).value||'';
  var res = CTGB_DATA;
  if (q.length >= 1) {
    var ql = q.toLowerCase();
    res = res.filter(function(m){
      return m.naam.toLowerCase().includes(ql) || (m.werkzameStoffen&&m.werkzameStoffen.toLowerCase().includes(ql));
    });
  }
  if (f) res = res.filter(function(m){return m.aardWerking&&m.aardWerking.includes(f);});
  var el2 = document.getElementById('cr'); if (!el2) return;
  el2.innerHTML = '';
  if (!res.length) { el2.innerHTML='<div class="empty">Geen resultaten</div>'; return; }
  res.slice(0,60).forEach(function(m){
    var badges = div('',{style:'margin-top:5px'},[
      el('span',{cls:'badge bW',txt:m.aardWerking||''})
    ]);
    if (m.veiligheidstermijn) badges.appendChild(el('span',{cls:'badge bA',style:'margin-left:4px',txt:'\u23f1 '+m.veiligheidstermijn}));
    if (m.maxToepassingenTeelt) badges.appendChild(el('span',{cls:'badge bB',style:'margin-left:4px',txt:'max '+m.maxToepassingenTeelt+'x/teelt'}));
    if (m.minInterval) badges.appendChild(el('span',{cls:'badge bC',style:'margin-left:4px',txt:'interval '+m.minInterval}));

    var card = div('card csm',[
      div('',{style:'display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap'},[
        div('',{style:'flex:1;min-width:0'},[
          el('div',{style:'font-size:14px;font-weight:500',txt:m.naam}),
          el('div',{style:'font-size:12px;color:var(--txt2);margin-top:2px',txt:m.werkzameStoffen||''}),
          badges
        ]),
        div('',{style:'display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap'},[
          btn('Details','sm',function(naam){return function(){tCTGB(naam);};}(m.naam)),
          btn('+ Catalogus','sm grn',function(naam){return function(){cCat(naam);};}(m.naam)),
          btn('+ Vergelijk','sm',function(naam){return function(){cVerg(naam);};}(m.naam))
        ])
      ])
    ]);
    el2.appendChild(card);
  });
  if (res.length > 60) el2.appendChild(el('div',{cls:'empty',txt:'Toont 60 van '+res.length+' \u2014 verfijn zoekopdracht'}));
}
function tCTGB(naam) {
  var m = gCTGB(naam); if (!m) return;
  var velden = [
    ['Toelatingsnummer',m.toelatingsnummer],['Werkzame stoffen',m.werkzameStoffen],
    ['Aard werking',m.aardWerking],['Toepassingsgebied',m.toepassingsgebied],
    ['Gebruik',m.gebruik],['Max dosis/toepassing',m.maxDosis],
    ['Max dosis/seizoen',m.maxDosisSeizoen],['Min. interval',m.minInterval],
    ['Max toep./teeltcyclus',m.maxToepassingenTeelt],
    ['Max toep./12 maanden',m.maxToepassingen12m],['Veiligheidstermijn',m.veiligheidstermijn]
  ].filter(function(r){return r[1];});

  var info = div('ci');
  velden.forEach(function(v){
    info.appendChild(div('cr',[
      el('span',{cls:'cl',txt:v[0]}),
      el('span',{style:'font-size:12px',txt:String(v[1])})
    ]));
  });

  openModal(el('div',{cls:'modal'},[
    el('div',{cls:'mtit',txt:naam}),
    info,
    el('div',{cls:'sep'}),
    div('',{style:'display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap'},[
      btn('Sluiten','',sM),
      btn('+ Vergelijken','',function(){sM();cVerg(naam);gN('vergelijk');}),
      btn('+ Catalogus','grn',function(){sM();cCat(naam);})
    ])
  ]));
}
function cCat(naam) {
  if (db.producten.find(function(p){return p.ctgb===naam;})) { alert(naam+' staat al in je catalogus.'); return; }
  var m = gCTGB(naam);
  var type = m && m.aardWerking ? m.aardWerking.split(',')[0].trim() : 'Gewasbescherming';
  db.producten.push({id:uid(),naam:naam,type:type,eenheid:'L',prijs:0,ctgb:naam});
  sv(); alert(naam+' toegevoegd. Stel prijs en eenheid in via Producten.');
}

/* ---- VERGELIJKEN ---- */
var verg = [];
function cVerg(naam) {
  if (verg.includes(naam)) return;
  if (verg.length >= 5) { alert('Max 5 middelen'); return; }
  verg.push(naam);
  var m = document.createElement('div');
  m.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:var(--G);color:var(--Gt);border:.5px solid var(--Gb);border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;z-index:300';
  m.textContent = naam + ' toegevoegd aan vergelijking';
  document.body.appendChild(m);
  setTimeout(function(){m.remove();}, 2500);
  if (document.getElementById('pg-vergelijk').classList.contains('on')) rVerg();
}
function rVerg() {
  var el2 = document.getElementById('pg-vergelijk');
  el2.innerHTML = '';
  var qInp = el('input',{id:'vq',placeholder:'Zoek middel om toe te voegen...',style:'flex:1'});
  qInp.oninput = function() {
    var q = qInp.value;
    var res = zCTGB(q);
    var el3 = document.getElementById('vzr'); if (!el3) return;
    el3.innerHTML = '';
    if (!res.length || q.length < 2) return;
    var zr = div('zres');
    res.slice(0,12).forEach(function(m){
      var zi = div('zi',[
        el('div',{cls:'zn',txt:m.naam}),
        el('div',{cls:'zs',txt:(m.aardWerking||'')+' \u00b7 '+(m.werkzameStoffen||'')})
      ]);
      zi.onclick = function(){
        cVerg(m.naam);
        qInp.value=''; el3.innerHTML=''; rVCh();
      };
      zr.appendChild(zi);
    });
    el3.appendChild(zr);
  };

  el2.appendChild(div('ph',[
    div('',[
      el('div',{cls:'pht',txt:'Middelen vergelijken'}),
      el('div',{cls:'phs',txt:'Max 5 middelen naast elkaar'})
    ]),
    delbtn(function(){verg=[];rVerg();})
  ]));
  el2.appendChild(div('',{style:'display:flex;gap:8px;margin-bottom:6px'},[qInp]));
  el2.appendChild(el('div',{id:'vzr',style:'margin-bottom:8px'}));
  el2.appendChild(el('div',{id:'vch',style:'margin-bottom:1rem;min-height:32px;display:flex;flex-wrap:wrap;gap:4px;align-items:center'}));
  el2.appendChild(el('div',{id:'vtb'}));
  rVCh();
}
function rVCh() {
  var el2 = document.getElementById('vch'); if (!el2) return;
  el2.innerHTML = '';
  if (!verg.length) {
    el2.appendChild(el('span',{style:'font-size:13px;color:var(--txt3)',txt:'Nog geen middelen geselecteerd'}));
  } else {
    verg.forEach(function(n){
      var chip = el('span',{cls:'sc'},[ el('span',{txt:n}) ]);
      var x = el('span',{style:'cursor:pointer;margin-left:3px;font-weight:600',txt:'\u2715'});
      x.onclick = function(){verg.splice(verg.indexOf(n),1);rVCh();};
      chip.appendChild(x);
      el2.appendChild(chip);
    });
  }
  rVTb();
}
function rVTb() {
  var el2 = document.getElementById('vtb'); if (!el2) return;
  el2.innerHTML = '';
  if (!verg.length) return;
  var velden = [
    ['Toelatingsnummer','toelatingsnummer'],['Werkzame stoffen','werkzameStoffen'],
    ['Aard werking','aardWerking'],['Toepassingsgebied','toepassingsgebied'],
    ['Max dosis/toepassing','maxDosis'],['Max dosis/seizoen','maxDosisSeizoen'],
    ['Min. interval','minInterval'],['Veiligheidstermijn','veiligheidstermijn'],
    ['Max toep./teelt','maxToepassingenTeelt'],['Max toep./12 mnd','maxToepassingen12m']
  ];
  var mids = verg.map(gCTGB).filter(Boolean);
  if (!mids.length) { el2.innerHTML='<div class="empty">Geen geldige middelen</div>'; return; }

  var tbl = el('table',{cls:'ctbl'});
  var thead = document.createElement('thead');
  var hrow = document.createElement('tr');
  hrow.appendChild(el('th',{style:'min-width:160px;font-size:11px',txt:'Eigenschap'}));
  mids.forEach(function(m){ hrow.appendChild(el('th',{txt:m.naam})); });
  thead.appendChild(hrow); tbl.appendChild(thead);

  var tbody = document.createElement('tbody');
  velden.forEach(function(vf){
    var uniq = new Set(mids.map(function(m){return m[vf[1]]||'';}));
    var diff = uniq.size > 1;
    var row = document.createElement('tr');
    if (diff) row.style.background = 'var(--A)';
    row.appendChild(el('td',{style:'color:var(--txt2);font-size:11px;white-space:nowrap;font-weight:'+(diff?'600':'400'),
      txt:vf[0]+(diff?' *':'')}));
    mids.forEach(function(m){
      var td = document.createElement('td');
      td.textContent = m[vf[1]] ? String(m[vf[1]]) : '\u2014';
      if (!m[vf[1]]) td.style.color='var(--txt3)';
      row.appendChild(td);
    });
    tbody.appendChild(row);
  });
  tbl.appendChild(tbody);

function inp(id, type, placeholder, value, attrs) {

  if(value!==undefined&&value!==null)i.value=value;
  if(attrs)Object.keys(attrs).forEach(function(k){i.setAttribute(k,attrs[k]);});
  return i;
}

/* ---- CSV / JSON ---- */
function openImp() {
  var finp=el('input',{type:'file',id:'ci',accept:'.csv,.txt',style:'display:none'});
  finp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var lines=ev.target.result.split('\n').filter(function(l){return l.trim();});
      var ok=0,fout=0;
      lines.forEach(function(line){
        var d=line.split(',').map(function(x){return x.trim().replace(/^"|"$/g,'');});
        if(d.length<3||!d[0]||!d[1]||!d[2]){fout++;return;}
        db.producten.push({id:uid(),naam:d[0],type:d[1],eenheid:d[2],prijs:parseFloat(d[3])||0,ctgb:null});ok++;
      });
      sv();sM();rProd();alert(ok+' producten geimporteerd'+(fout?', '+fout+' overgeslagen':'')+'.');
    };
    reader.readAsText(file);
  };
  var ia=div('ia',[el('span',{txt:'Klik om CSV-bestand te kiezen'}),finp]);
  ia.onclick=function(){finp.click();};
  openModal(div('modal',[
    el('div',{cls:'mtit',txt:'Importeer producten via CSV'}),
    el('div',{style:'font-size:13px;color:var(--txt2);margin-top:8px;line-height:1.8',
      html:'Formaat (geen header):<br><code style="background:var(--bg2);padding:2px 8px;border-radius:4px;font-size:12px">naam,type,eenheid,prijs</code>'}),
    ia,
    el('div',{cls:'sep'}),
    div('',{style:'display:flex;justify-content:flex-end'},[btn('Sluiten','',sM)])
  ]));
}
function expJ(){
  var blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='vhoof_akkerbouw_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function impJ(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!data.percelen||!data.producten)return alert('Ongeldig bestand');
      if(!confirm('Dit overschrijft alle data. Doorgaan?'))return;
      if(!data.gewassen)data.gewassen=DEF_GEW.slice();
      data.percelen.forEach(function(p){if(!p.inkomsten)p.inkomsten=[];});
      db=data;sv();rOv();
    }catch(err){alert('Fout bij inlezen.');}
  };
  reader.readAsText(file);
}

var firebaseApp, firestoreDb, firebaseAuth, currentUser = null;

var firebaseConfig = {
  apiKey: "AIzaSyDShu7QgGDSsl_0iE9b7ToF7V1HpBEyCC4",
  authDomain: "teelt-regristratie-vhoof.firebaseapp.com",

  storageBucket: "teelt-regristratie-vhoof.firebasestorage.app",
  messagingSenderId: "269715788145",
  appId: "1:269715788145:web:641cdee0dfdfadc1d8a6d0"
};

function initFirebase() {
  firebaseApp   = firebase.initializeApp(firebaseConfig);
  firestoreDb   = firebase.firestore();
  firebaseAuth  = firebase.auth();

  var vorigeUid = localStorage.getItem('vhoof_uid');

  firebaseAuth.onAuthStateChanged(function(user) {
    currentUser = user;
    if (user) {
      // Als andere gebruiker inlogt, wis lokale data
      if (vorigeUid && vorigeUid !== user.uid) {
        localStorage.removeItem('vhoof');
        db = {
          percelen: [],
          producten: [
            {id:'p1',naam:'Kalksalpeter 27%',type:'Kunstmest',eenheid:'kg',prijs:0.42,ctgb:null},
            {id:'p2',naam:'KAS 27% N',type:'Kunstmest',eenheid:'kg',prijs:0.38,ctgb:null},
            {id:'p3',naam:'Roundup 360',type:'Herbicide',eenheid:'L',prijs:4.20,ctgb:null},
          ],
          actietypen: JSON.parse(JSON.stringify(DEF_AT)),
          gewassen: DEF_GEW.slice()
        };
      }
      localStorage.setItem('vhoof_uid', user.uid);
      vorigeUid = user.uid;
      showApp(user);
      laadVanFirebase();
    } else {
      localStorage.removeItem('vhoof_uid');
      showLogin();
    }
  });
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display  = 'none';
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display   = 'block';
  document.getElementById('user-name').textContent = user.displayName || user.email;
  document.getElementById('user-avatar').src = user.photoURL || '';
}

function loginMetGoogle() {
  var provider = new firebase.auth.GoogleAuthProvider();
  firebaseAuth.signInWithPopup(provider).catch(function(err) {
    alert('Inloggen mislukt: ' + err.message);
  });
}

function uitloggen() {
  if (!confirm('Uitloggen?')) return;
  firebaseAuth.signOut();
}

var saveTimer = null;
function sv() {
  localStorage.setItem('vhoof', JSON.stringify(db));
  if (!currentUser) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(slaOpFirebase, 1000);
}

function slaOpFirebase() {
  if (!currentUser) return;
  var doc = firestoreDb.collection('users').doc(currentUser.uid);
  var data = {
    percelen:    JSON.stringify(db.percelen),
    producten:   JSON.stringify(db.producten),
    actietypen:  JSON.stringify(db.actietypen),
    gewassen:    JSON.stringify(db.gewassen),
    bijgewerkt:  firebase.firestore.FieldValue.serverTimestamp()
  };
  doc.set(data).then(function() {
    var ind = document.getElementById('sync-indicator');
    if (ind) { ind.textContent = '✔ Gesynchroniseerd'; ind.style.color='var(--Gm)'; }
  }).catch(function(err) {
    var ind = document.getElementById('sync-indicator');
    if (ind) { ind.textContent = '⚠ Sync fout'; ind.style.color='var(--Rt)'; }
    console.error('Firebase save fout:', err);
  });
  var ind = document.getElementById('sync-indicator');
  if (ind) { ind.textContent = '↻ Synchroniseren...'; ind.style.color='var(--txt2)'; }
}

function laadVanFirebase() {
  if (!currentUser) return;
  var ind = document.getElementById('sync-indicator');
  if (ind) { ind.textContent = '↻ Laden...'; ind.style.color='var(--txt2)'; }

  firestoreDb.collection('users').doc(currentUser.uid).get().then(function(doc) {
    if (doc.exists) {
      var data = doc.data();
      try {
        if (data.percelen)   db.percelen   = JSON.parse(data.percelen);
        if (data.producten)  db.producten  = JSON.parse(data.producten);
        if (data.actietypen) db.actietypen = JSON.parse(data.actietypen);
        if (data.gewassen)   db.gewassen   = JSON.parse(data.gewassen);
        // Migratie: zorg dat alle percelen inkomsten hebben
        db.percelen.forEach(function(p){ if(!p.inkomsten) p.inkomsten=[]; });
        localStorage.setItem('vhoof', JSON.stringify(db));
      } catch(e) { console.error('Parse fout:', e); }
    }
    if (ind) { ind.textContent = '✔ Gesynchroniseerd'; ind.style.color='var(--Gm)'; }
    rTab(curTab);
  }).catch(function(err) {
    if (ind) { ind.textContent = '⚠ Laad fout'; ind.style.color='var(--Rt)'; }
    console.error('Firebase laad fout:', err);
    rTab(curTab);
  });
}
